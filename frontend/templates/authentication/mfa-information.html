{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{% static 'tailwindcss/dist/output.css' %}">
    <title>Multi-Factor Authentication</title>
</head>
<body class="w-screen h-dvh">
    
    <div class="flex items-start justify-center">
        <div class="max-w-lg md:max-w-2xl w-full border-2 border-site-border-color rounded-xs px-10 py-3 space-y-4">
            <div>
                <p class="text-base font-medium">Multi-Factor Authentication prevents unauthorized access to your account.</p>
            </div>
            <div class="w-full flex items-center justify-center">
                <form action="" method="POST">
                    <button type="submit" class="w-1/3 px-2 py-2 bg-site-primary-violet rounded-xs
                                                hover:bg-site-primary-violet-shaded cursor-pointer">
                        Setup
                    </button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
