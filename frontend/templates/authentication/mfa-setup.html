{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{% static 'tailwindcss/dist/output.css' %}">
    <title>Multi-Factor Authentication Setup</title>
</head>
<body>
    <div class="w-screen h-dvh flex flex-col items-center justify-start">
        <div class="max-w-sm md:max-w-lg w-full px-5 border-2 border-site-border-color rounded-sm mt-2">
            <div class="w-full py-5 border-b-2 border-site-border-color">
                <h1 class="text-base font-medium text-black text-center">Multi-Factor Authentication Setup</h1>
            </div>
            <div class="w-full py-2">
                <h5 class="text-sm text-center">Secure your account using an authenticator app.</h5>
            </div>
            <div class="py-2 w-full space-y-2">
                <p class="text-sm font-medium">1. &nbsp; Scan the QR code with your authenticator app.</p>
                <img src="data:image/png;base64,{{ qrcode_image }}" alt="qrcode-image" 
                        class="w-60 h-60 block mx-auto">
                <div class="space-y-1">
                    <label for="qr-token">Or enter the code manually.</label>
                    <div type="text" name="qrcode-image-uri" id="qrcode-image-uri" 
                                class="px-2 py-1 focus:ring-0 outline-none w-full border-2 border-site-border-color
                                        rounded-xs"></div>
                </div>                    
                <div class="space-y-2">      
                    <div class="space-y-2">
                        <label for="verification-code" class="text-sm font-medium">2. Enter the verification code from your app.</label>
                        <input type="text" name="verification-code" id="verification-code" 
                                placeholder="Authenticator Code" class="px-2 py-1 focus:ring-0 outline-none w-full border-2 border-site-border-color
                                                            rounded-xs">
                    </div>
                    <div>
                        <button id="verify-button" type="button" class="w-1/2 bg-site-primary-violet
                                hover:bg-site-primary-violet-shaded px-2 py-2 cursor-pointer 
                                block mx-auto rounded-xs">
                                Verify
                        </button>
                    </div>
                </div>
            </div>
        </div>
        <div id="verification-message" class="text-red-400 font-medium mt-2">
        </div>
    </div>

    <script src="{% static 'scripts/js/verify-mfa.js' %}"></script>
</body>
</html>
