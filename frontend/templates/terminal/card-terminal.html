{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{% static 'tailwindcss/dist/output.css' %}">
    <title>Terminal Endpoint</title>
</head>
<body>

    <nav class="w-full h-18 bg-site-primary-color flex justify-start items-center px-8 py-1 text-white space-x-4">
        <div>
            <svg class="w-14 h-14" fill="currentColor" viewBox="0 0 24 24">
                <path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 14H4V6h16v12zm-9 1h2v2h-2zm-4 0h2v2H7zm8 0h2v2h-2zM8 11l1.5 1.5L8 14h2l1.5-1.5L10 11H8zm4 3h4v-1.5h-4V14zm0-2.5h4V10h-4v1.5z"/>
            </svg>
        </div>
        <div class="space-y-1">
            <h1 class="text-2xl font-medium">Logic Test Terminal</h1>
            <h3 class="text-sm">Validate fraud detection rules and transaction flows.</h3>
        </div>
    </nav>

    <main id="check-width" class="bg-site-terminal-bg-purple h-auto md:h-terminal-main-h px-4 md:px-10 pt-5 pb-10
                    grid grid-cols-1 md:grid-cols-9 gap-4 w-full">
        <section class="col-span-1 md:col-span-6 grid grid-cols-1 md:grid-cols-subgrid w-full bg-white h-full gap-0 rounded-sm pb-4">
            <div class="col-span-1 md:col-start-1 md:col-end-5 md:row-start-1 bg-site-terminal-blue px-4 py-2 w-full rounded-tl-sm">
                <h5 class="text-white font-medium text-base">Simulation Controls</h5>
            </div>
            <div class="col-span-1 md:col-start-1 md:col-end-5 md:row-start-2 w-full px-4">

                <form action="{% url 'terminal:save_transaction' %}" method="POST">
                    {% csrf_token %}

                    <div class="py-1 border-b-2 border-site-border-color">
                        <div class="flex flex-col md:flex-row md:items-center justify-start md:space-x-2
                                    space-y-2 md:space-y-0">
                            <label for="card-number" class="w-full md:w-44 flex-shrink-0">Card Number</label>
                            <input type="number" name="card-number" id="card-number" class="px-2 py-1 border-2 
                                border-site-border-color w-full outline-none rounded-xs">
                        </div>
                        <div class="pt-1 w-full flex flex-col md:flex-row md:items-center justify-start md:space-x-2
                                    space-y-2 md:space-y-0">
                            <label for="expiry-date" class="w-full md:w-44 flex-shrink-0">Expiry Date</label>
                            <div class="md:space-x-2 flex flex-col md:flex-row md:items-center justify-start w-full
                                        space-y-2">
                                <input type="text" name="expiry-date" id="expiry-date" class="w-1/2 md:w-1/2 px-2 py-1 border-2
                                    border-site-border-color outline-none rounded-xs"
                                    pattern="(0[1-9]|1[0-2])\/[0-9]{2}" placeholder="MM/YY">
                            </div>
                        </div>
                    </div>
                    <div class="py-1 border-b-2 border-site-border-color flex flex-col md:flex-row md:items-center justify-start md:space-x-2
                                    space-y-2 md:space-y-0">
                        <label for="cardholder-name" class="w-44">Cardholder Name</label>
                        <input type="text" name="cardholder-name" id="cardholder-name" class="px-2 py-1 border-2 
                                border-site-border-color w-full outline-none rounded-xs">
                    </div>
                    <div class="py-1 border-b-2 border-site-border-color">
                        <div class="pt-1 w-full flex items-center justify-start space-x-2">
                            <label for="amount" class="w-44">Amount</label>
                            <input type="number" name="amount" id="amount" class="px-2 py-1 border-2 
                                border-site-border-color w-full outline-none rounded-xs">
                        </div>
                        <div class="pt-1 w-full flex flex-col md:flex-row md:items-center justify-start md:space-x-2
                                    space-y-2 md:space-y-0">
                            <label for="currency" class="w-44">Currency</label>
                            <select name="currency" id="currency" class="px-2 py-1 border-2 
                                border-site-border-color w-full outline-none rounded-xs">
                                <option value="usd">USD</option>
                            </select>
                        </div>
                        <div class="pt-1 w-full flex flex-col md:flex-row md:items-center justify-start md:space-x-2
                                    space-y-2 md:space-y-0">
                            <label for="location" class="w-44">Location</label>
                            <select name="location" id="location" class="px-2 py-1 border-2 
                                border-site-border-color w-full outline-none rounded-xs">
                            </select>
                        </div>
                        <div class="pt-1 w-full flex flex-col md:flex-row md:items-center justify-start md:space-x-2
                                    space-y-2 md:space-y-0">
                            <label for="merchant-type" class="w-44">Merchant Type</label>
                            <select name="merchant-type" id="merchant-type" class="px-2 py-1 border-2 
                                border-site-border-color w-full outline-none rounded-xs">
                                <option value="retail">Retail</option>
                                <option value="e-commerce">E-commerce</option>
                                <option value="wholesale">Wholesale</option>
                            </select>
                        </div>
                    </div>
                    <div class="py-1 border-b-2 border-site-border-color flex flex-col md:flex-row md:items-center justify-start md:space-x-2
                                    space-y-2 md:space-y-0">
                        <label for="ip-address" class="w-44">IP Address</label>
                        <input type="text" name="ip-address" id="ip-address" class="px-2 py-1 border-2 
                                border-site-border-color w-full outline-none rounded-xs">
                    </div>
                    <div class="py-1 border-b-2 border-site-border-color flex flex-col md:flex-row md:items-center justify-start md:space-x-2
                                    space-y-2 md:space-y-0">
                        <label for="transaction-date" class="w-44">Transaction Date</label>
                        <input type="date" name="transaction-date" id="transaction-date" class="px-2 py-1 border-2 
                                border-site-border-color w-full outline-none rounded-xs">
                    </div>
                    <div class="w-full py-1">
                        <button type="submit" class="w-64 bg-site-primary-violet hover:bg-site-primary-violet-shaded
                                        py-2 px-2 text-white text-base rounded-xs cursor-pointer ml-36">Purchase</button>
                    </div>
                </form>
            </div>
            <div class="col-span-1 md:col-start-5 md:col-end-7 md:row-start-1 bg-site-terminal-blue px-4 py-2 w-full rounded-tr-sm">
                <h5 class="text-white font-medium text-base">Response</h5>
            </div>
            <div class="col-span-1 md:col-start-5 md:col-end-7 md:row-start-2 py-4 px-4 w-full">
                <div>
                    {% if transaction_saved %}
                        <p class="text-base font-medium text-blue-400">{{ transaction_saved }}</p>
                    {% elif error %}
                        <p class="text-base font-medium text-red-400">{{ error }}</p>
                    {% endif %}
                </div>
            </div>
        </section>              
    </main>

    <script src="{% static 'scripts/js/dimension-script.js' %}"></script>
    <script src="{% static 'scripts/js/countries-json.js' %}"></script>
</body>
</html>
