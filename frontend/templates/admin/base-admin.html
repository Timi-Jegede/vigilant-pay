{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    {% load plotly_dash %}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{% static 'tailwindcss/dist/output.css' %}">
    <title>Admin</title>

    <style>
        select {
            appearance: none;
            -webkit-appearance: none;
            -moz-appearance: none;
            background-image: url('data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A//www.w3.org/2000/svg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%23007CB2%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22/%3E%3C/svg%3E');
            background-repeat: no-repeat;
            background-position: right 12px top 50%;
            background-size: 12px auto;
        }
    </style>

    {% plotly_header %}
</head>
<body>
    <!-- Navigaion -->
     <!-- Templates base.html -->

    <nav class="w-full h-12 bg-site-primary-color flex justify-between items-center px-6">
        <div class="flex items-center justify-center space-x-2">
            <button id="site-hamburger-button" class="cursor-not-allowed" disabled>
                <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" 
                        stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                </svg>
            </button>
            <a href="{% url 'system_admin:admin_index' %}" class="block"><h1 class="text-white text-xl font-medium">Admin</h1></a>
        </div>
        <div id="profile-icon" class="cursor-pointer">
            <div class="w-8 h-8 rounded-full border border-white flex items-center justify-center">
                <svg class="w-6 h-6 text-white" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 
                    0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"></path>
                </svg>
            </div>
        </div>
    </nav>

    <!-- User Menu -->
    <div id="profile-menu" class="absolute top-10 right-0 mr-6 w-48 h-28 bg-white z-50 shadow-md hidden">
        <ul class="flex flex-col py-4 px-4 space-y-1">
            <a href="{% url 'system_admin:admin_profile' %}" class="block"><li class="text-base text-gray-600 flex justify-start items-center space-x-1.5
                                                hover:text-site-link-hover-color">
                <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                </svg>
                <span>Profile</span>
            </li></a>
            <a href="{% url 'system_admin:admin_security' %}" class="block"><li class="text-base text-gray-600 flex justify-start items-center space-x-1.5
                                                hover:text-site-link-hover-color">
                <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/>
                </svg>
                <span>Settings</span>
            </li></a>
            <a href="{% url 'login:logout' %}" class="block"><li class="text-base text-gray-600 flex justify-start items-center space-x-1.5
                                                hover:text-site-link-hover-color">
                <svg class="w-5 h-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                    <polyline points="16 17 21 12 16 7"/>
                    <line x1="21" y1="12" x2="9" y2="12"/>
                </svg>
                <span>Logout</span>
            </li></a>
        </ul>
    </div>


<!-- Body Section -->
     <div class="grid grid-cols-12">

        <!-- Sidebar -->
        <div id="sidebar" class="col-span-2 bg-site-primary-color h-sidebar-height overflow-auto transition 
                                duration-300 ease-linear">
            <div class="mt-sidebar-inner-top-margin w-full flex flex-col items-center justify-center space-y-3">
                <a id="transactions" href="{% block sidenav_firsturl %}/{% endblock sidenav_firsturl %}" class="block text-white text-base hover:text-site-link-hover-color">
                    <span id="account-overview-text">
                        {% block firsturl %}

                        {% endblock firsturl %}
                    </span>
                </a>
                <a id="dashboard" href="{% block sidenav_secondurl %}/{% endblock sidenav_secondurl %}" class="block text-white text-base hover:text-site-link-hover-color">
                    <span id="security-log-text">
                        {% block secondurl %}

                        {% endblock secondurl %}
                    </span>
                </a>
            </div>

        </div>

        <!-- Main -->
        <div id="main" class="col-span-10 bg-site-background-color h-sidebar-height overflow-auto">
            <div id="dashboard" class="w-full h-18 bg-white flex items-center pl-10 shadow-md">
                <h1 class="font-sans font-medium text-site-primary-color text-3xl font-stretch-condensed">Account Overview</h1>
            </div>
            
            <main>
                {% block content %}
                    
                    

                {% endblock %}
            </main>
        </div>
     </div>

     <script src="{% static 'scripts/js/site-script.js' %}"></script>
</body>
</html>
