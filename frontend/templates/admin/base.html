{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="{% static 'tailwindcss/dist/output.css' %}" rel="stylesheet">
    <title>{% block section_name %}{% endblock section_name %}</title>
</head>
<body class="h-dvh flex font-instrument flex-col overflow-hidden">
    <header class="bg-admin-off-white w-full border-b border-admin-soft-gray">
        <div class="flex items-center justify-start px-10">
            <div class="w-56 border-r-2 border-admin-soft-gray py-3 cursor-pointer">
                <h1 class="text-admin-teal font-instrument font-bold text-2.66xl text-left">Vigilant Pay</h1>
            </div>
            <div class="flex-1 flex items-center justify-between py-3">
                <div class="pl-20 flex items-center justify-center space-x-4">
                    <div class="flex items-center cursor-pointer">
                        <svg class="fill-current w-6 text-admin-teal" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 50 50">
                            <path d="M 21 3 C 11.621094 3 4 10.621094 4 20 C 4 29.378906 11.621094 37 21 37 C 24.710938 37 28.140625 35.804688 30.9375 33.78125 L 44.09375 46.90625 L 46.90625 44.09375 L 33.90625 31.0625 C 36.460938 28.085938 38 24.222656 38 20 C 38 10.621094 30.378906 3 21 3 Z M 21 5 C 29.296875 5 36 11.703125 36 20 C 36 28.296875 29.296875 35 21 35 C 12.703125 35 6 28.296875 6 20 C 6 11.703125 12.703125 5 21 5 Z"></path>
                        </svg>
                    </div>
                    <div>
                        <input type="search" name="global-search" id="global-search" placeholder="Global Search" class="bg-admin-base-pale-gray
                        border-admin-neutral-gray outline-none rounded-lg pl-5 w-64 ring-0">
                    </div>
                </div>
                <div class="pl-10 space-x-40 flex items-center justify-between">
                    <div id="queue-stats" class="text-admin-deep-navy-blue font-medium text-sm flex items-center space-x-2">
                        <span>Queue Stats:</span>
                    </div>
                    <div class="text-admin-teal text-2xl">
                        <h2>Admin</h2>
                    </div>
                </div>
            </div>
        </div>
    </header>
    
    <main class="flex-1 bg-admin-royal-navy-blue overflow-hidden">
        <div class="px-10 flex flex-col h-full pb-7.5">
            <div class="relative">
                <div class="bg-admin-ultra-dark-navy-blue border border-admin-teal
                text-admin-ultra-light-neutral-gray text-sm w-2xs py-1.5 px-4 flex items-center justify-between">
                    <h3>Alert Queue and Case Management</h3>
                    <button id="admin-selector" class="w-3 cursor-pointer">
                        <svg class="text-admin-ultra-light-neutral-gray fill-current" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" x="0px" y="0px" viewBox="0 0 386.257 386.257" style="enable-background:new 0 0 386.257 386.257;" xml:space="preserve">
                            <polygon points="0,96.879 193.129,289.379 386.257,96.879 "></polygon>
                        </svg>
                    </button>
                </div>
                <div id="admin-selector-menu" class="bg-admin-ultra-dark-navy-blue border border-admin-teal
                text-admin-ultra-light-neutral-gray text-sm w-2xs py-1.5 px-4 h-48 hidden opacity-0 scale-95
                absolute -translate-y-2 origin-top-left left-0 top-8 transition-all duration-200 ease-out z-50
                top-5">
                    <ul>
                        <a href="#" class="cursor-pointer"><li>Alert Queue and Case Management</li></a>
                    </ul>
                </div>
            </div>
            
            {% block section %}

            {% endblock section %}
        </div>
    </main>

    <script src="{% static 'scripts/js/admin-dashboard.js' %}"></script>
</body>
</html>
