<!-- User Profile -->
 {% extends '../base-settings.html' %}

    {% block content %}

        {% load static %}

        <div class="grid grid-rows-5 gap-6 h-dvh px-6">
            <div class="row-span-1">
                <div class="relative py-4 border-b-2 border-site-border-color">
                    <h1 class="text-site-dashboard-first-gray-color 
                            text-xl font-medium">Profile Settings</h1>
                    <a href="{% url 'index' %}" class="font-medium text-site-dashboard-first-gray-color
                            absolute right-6 top-1/2 -translate-y-1/2 text-lg">x</a>
                </div>
                <div class="py-4 border-b-2 border-site-border-color">
                    <p class="text-site-dashboard-second-gray-color
                            text-sm">Manage Your Account Information.</p>
                </div>
            </div>

            <div class="row-span-4 border-t-2 border-site-border-color">
                <div class="px-3 py-2 border-b-2 border-site-border-color">
                    <h2 class="text-base text-site-dashboard-first-gray-color">Account Information</h2>
                </div>
                <div class="flex items-center justify-start px-3 space-x-6 py-3">
                    <img src="{% static 'images/alex.jpg' %}" alt="user's image" class="h-28 w-28 rounded-full">
                    <div class="flex flex-col items-start justify-center space-y-1">
                        <strong class="text-site-dashboard-first-gray-color text-lg">James Mitchell</strong>
                        <span class="text-site-dashboard-second-gray-color text-sm">jamesmitchell@gmail.com</span>
                    </div>
                </div>
                <div class="px-3 border-2 border-site-border-color py-2">
                    <form action="">
                        <div class="flex items-center justify-start space-x-6 border-b-2 border-site-border-color 
                                    py-3">
                            <label for="full-name" class="font-medium text-site-dashboard-first-gray-color
                                            text-base w-44">Full Name</label>
                            <input type="text" id="full-name" name="full-name" class="border-2 border-site-form-border-color
                                outline-none w-1/3 rounded-xs px-1 py-0.5">
                        </div>
                        <div class="flex items-center justify-start space-x-6 border-b-2 border-site-border-color 
                                    py-3">
                            <label for="email" class="font-medium text-site-dashboard-first-gray-color
                                            text-base w-44">Email Address</label>
                            <input type="text" id="email" class="border-2 border-site-form-border-color
                                outline-none w-1/3 rounded-xs px-1 py-0.5">
                        </div>
                        <div class="flex items-center justify-start space-x-6 py-3">
                            <label for="phone-number" class="font-medium text-site-dashboard-first-gray-color
                                            text-base w-44">Phone Number</label>
                            <input type="number" id="phone-number" class="border-2 border-site-form-border-color w-1/3 rounded-xs px-1 py-0.5">
                        </div>
                        <div class="ml-18 space-x-4 py-3">
                            <button class="bg-site-button-green text-white px-2 py-1 rounded-sm 
                            hover:bg-site-hover-button-green cursor-pointer shadow-md font-medium">Change Password</button>
                            <button class="bg-site-table-transparent-purple hover:bg-site-table-purple text-white
                                cursor-pointer shadow-md font-medium text-white px-2 py-1 rounded-sm">Update Profile</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

    {% endblock content %}
