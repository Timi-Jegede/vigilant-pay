{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{% static 'tailwindcss/dist/output.css' %}">
    <title>Register Users</title>
</head>
<body>
    <div class="w-full h-screen bg-white">
        <div class="flex flex-col items-center justify-center h-screen">
            <div class="max-w-lg w-full h-96 px-4 space-y-3 bg-header-color-fade shadow-2xl">
                <div class="py-2 mt-3">
                    <h1 class="text-3xl font-medium text-header-color">Sign up</h1>
                </div>
                <form action="register_users" method="POST">
                    {% csrf_token %}

                    <div class="flex items-center space-x-2">
                        <div class="flex flex-col items-start space-y-1 flex-1">
                            <label for="username">Username</label>
                            <input type="text" name="username" id="username" placeholder="Username" class="w-full p-2 outline-none bg-white">
                        </div>
                        <div class="flex flex-col items-start space-y-1 flex-1">
                            <label for="email">Email</label>
                            <input type="text" name="email" id="email" placeholder="Email" class="w-full p-2 outline-none bg-white">
                        </div>
                    </div>
                    <div class="flex items-center space-x-2">
                        <div class="flex flex-col items-start space-y-1 flex-1">
                            <label for="first-name">First Name</label>
                            <input type="text" name="first-name" id="first-name" placeholder="First Name" class="w-full p-2 outline-none bg-white">
                        </div>
                        <div class="flex flex-col items-start space-y-1 flex-1">
                            <label for="last-name">Last Name</label>
                            <input type="text" name="last-name" id="last-name" placeholder="Last Name" class="w-full p-2 outline-none bg-white">
                        </div>
                    </div>
                    <div class="flex items-center space-x-2">
                        <div class="flex flex-col items-start space-y-1 flex-1">
                            <label for="password">Password</label>
                            <input type="password" name="password" id="password" placeholder="Password" class="w-full p-2 outline-none bg-white">
                        </div>
                        <div class="flex flex-col items-start space-y-1 flex-1">
                            <label for="confirm-password">Confirm Password</label>
                            <input type="password" name="confirm-password" id="confirm-password" placeholder="Confirm Password" class="w-full p-2 outline-none bg-white">
                        </div>
                    </div>
                    <div>
                        <button type="submit" class="w-32 px-2 py-2 text-white bg-header-color cursor-pointer text-base">Sign up</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
