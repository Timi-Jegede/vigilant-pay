name: Django CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    # Use services to run Postgres and Redis in parallel for testing
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: vigilant_pay_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:latest
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.13.7
      uses: actions/setup-python@v4
      with:
        python-version: "3.13.7"
        
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt
        
    - name: Run Migrations and Tests
      env:
        DATABASE_URL: postgres://postgres:postgres@localhost:5432/vigilant_pay_db
        REDIS_URL: redis://localhost:6379/0
        SECRET_KEY: ci-test-key
      run: |
        cd backend
        python manage.py migrate
        python manage.py test
