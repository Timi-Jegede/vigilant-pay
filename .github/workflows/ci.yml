name: Fraud Detection Engine CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: fraud_detection_engine_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:latest
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.13.7
      uses: actions/setup-python@v5
      with:
        python-version: "3.13.7"
        
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt
        
    - name: Run Migrations and Tests
      env:
        DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/fraud_detection_engine_db
        REDIS_URL: redis://127.0.0.1:6379/0
        SECRET_KEY: ci-test-key
        PYTHONUNBUFFERED: "1"
      run: |
        sleep 5
        
        cd backend
        python manage.py migrate
        pytest
